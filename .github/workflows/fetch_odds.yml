name: Fetch La Liga Odds

on:
  # Run every day at 09:00 UTC (11:00 Spain summer / 10:00 winter).
  # The script itself checks whether the next jornada is ≤ 5 days away
  # and exits silently if it is not.
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger from the Actions tab (useful for testing)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests "supabase>=2.0" python-dotenv

      - name: Validate secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$ODDS_API_KEY" ]; then
            echo "ERROR: One or more required secrets are missing."
            echo "Add SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY and ODDS_API_KEY in:"
            echo "GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}

      - name: Fetch and upload odds
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
        run: python .github/fetch_odds_api.py --upload
