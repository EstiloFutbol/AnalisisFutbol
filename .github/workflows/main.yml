name: Fetch La Liga Odds

on:
  # Run every day at 09:00 UTC (11:00 Spain summer / 10:00 winter).
  # The script itself checks whether the next jornada is ≤ 5 days away
  # and exits silently if it is not.
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase python-dotenv

      - name: Fetch and upload odds
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
        run: python .github/fetch_odds_api.py --auto --upload
